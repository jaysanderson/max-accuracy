server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types application/javascript text/css application/manifest+json image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }

    # PWA update semantics: the service worker and entry HTML must never be
    # served stale, everything fingerprinted/static can cache forever.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    # opencv.js is 10 MB and versioned only by path — cache long, the SW
    # precache controls updates.
    location /opencv/ {
        add_header Cache-Control "public, max-age=604800";
    }
}
